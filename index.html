// ── Moon phase calculation ──────────────────────────────────────
function getMoonPhase(date) {
  // Known new moon: Jan 6 2000
  const known = new Date(2000, 0, 6);
  const cycle = 29.53058867;
  const diff = (date - known) / (1000 * 60 * 60 * 24);
  const phase = ((diff % cycle) + cycle) % cycle;
  const pct = phase / cycle;
  let name, emoji;
  if      (pct < 0.03)  { name = 'New Moon';        emoji = '🌑'; }
  else if (pct < 0.22)  { name = 'Waxing Crescent'; emoji = '🌒'; }
  else if (pct < 0.28)  { name = 'First Quarter';   emoji = '🌓'; }
  else if (pct < 0.47)  { name = 'Waxing Gibbous';  emoji = '🌔'; }
  else if (pct < 0.53)  { name = 'Full Moon';        emoji = '🌕'; }
  else if (pct < 0.72)  { name = 'Waning Gibbous';  emoji = '🌖'; }
  else if (pct < 0.78)  { name = 'Last Quarter';    emoji = '🌗'; }
  else if (pct < 0.97)  { name = 'Waning Crescent'; emoji = '🌘'; }
  else                  { name = 'New Moon';         emoji = '🌑'; }
  return { name, emoji, pct, days: Math.round(phase) };
}

function getSeason(date) {
  const m = date.getMonth() + 1;
  const d = date.getDate();
  if ((m === 3 && d >= 20) || m === 4 || m === 5 || (m === 6 && d < 21))
    return { name: 'Spring', label: 'The Greening', color: '#7a9e6e', glyph: '❧' };
  if ((m === 6 && d >= 21) || m === 7 || m === 8 || (m === 9 && d < 22))
    return { name: 'Summer', label: 'The Ripening', color: '#c4841a', glyph: '☀' };
  if ((m === 9 && d >= 22) || m === 10 || m === 11 || (m === 12 && d < 21))
    return { name: 'Autumn', label: 'The Turning', color: '#b05a20', glyph: '🍂' };
  return { name: 'Winter', label: 'The Dreaming', color: '#7a9abe', glyph: '❄' };
}

// Moon SVG — draws the illuminated limb
function MoonSVG({ pct, size = 52 }) {
  const r = size / 2;
  // pct 0=new,0.5=full; illumination angle
  const angle = pct * 2 * Math.PI;
  // waxing 0–0.5, waning 0.5–1
  const waxing = pct <= 0.5;
  const illum = waxing ? pct * 2 : (1 - pct) * 2; // 0→1 bright fraction
  // The terminator x offset: -r (left) to +r (right)
  const tx = waxing ? r - illum * size : illum * size - r;
  // Build path: semicircle on bright side + ellipse for terminator
  const bright = waxing ? 1 : 0; // sweep direction for outer arc
  const termSweep = waxing ? 0 : 1;
  const d = [
    `M ${r} 0`,
    `A ${r} ${r} 0 0 ${bright} ${r} ${size}`,
    `A ${Math.abs(tx)} ${r} 0 0 ${termSweep} ${r} 0`,
    'Z'
  ].join(' ');

  const t = React.useContext(ThemeCtx);
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={r} cy={r} r={r - 0.5} fill={t.moonDisc} stroke={t.moonStroke} strokeWidth="0.8" />
      {illum > 0.02 && (
        <path d={d} fill="rgba(220,195,140,0.85)" />
      )}
      {pct > 0.44 && pct < 0.56 && (
        <circle cx={r} cy={r} r={r - 0.5} fill="none" stroke="rgba(220,195,140,0.3)" strokeWidth="3" />
      )}
    </svg>
  );
}

// Geometric drum pattern as SVG paths
function DrumPattern({ size = 200, color = "#c4651a" }) {
  const r = size / 2;
  const segments = 8;
  const paths = [];
  for (let i = 0; i < segments; i++) {
    const a1 = (i / segments) * Math.PI * 2 - Math.PI / 2;
    const a2 = ((i + 0.5) / segments) * Math.PI * 2 - Math.PI / 2;
    const x1 = r + (r * 0.38) * Math.cos(a1);
    const y1 = r + (r * 0.38) * Math.sin(a1);
    const x2 = r + (r * 0.72) * Math.cos(a2);
    const y2 = r + (r * 0.72) * Math.sin(a2);
    paths.push(`M ${r} ${r} L ${x1} ${y1} L ${x2} ${y2} Z`);
  }
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ position: 'absolute', top: 0, left: 0 }}>
      {paths.map((d, i) => (
        <path key={i} d={d} fill={color} opacity={i % 2 === 0 ? 0.18 : 0.08} />
      ))}
      {/* inner rings */}
      <circle cx={r} cy={r} r={r * 0.72} fill="none" stroke={color} strokeWidth="0.8" opacity="0.25" />
      <circle cx={r} cy={r} r={r * 0.5} fill="none" stroke={color} strokeWidth="0.8" opacity="0.18" />
      <circle cx={r} cy={r} r={r * 0.28} fill="none" stroke={color} strokeWidth="0.8" opacity="0.25" />
      {/* cross lines */}
      {[0, 45, 90, 135].map(deg => {
        const rad = deg * Math.PI / 180;
        return (
          <line key={deg}
            x1={r + r * 0.28 * Math.cos(rad)} y1={r + r * 0.28 * Math.sin(rad)}
            x2={r + r * 0.72 * Math.cos(rad)} y2={r + r * 0.72 * Math.sin(rad)}
            stroke={color} strokeWidth="0.6" opacity="0.2"
          />
        );
      })}
    </svg>
  );
}

        width: 320, height: 320,
        background: `radial-gradient(circle, ${t.glow} 0%, transparent 70%)`,
        pointerEvents: 'none',
      }} />

      {/* Header */}
      <div style={{
        padding: '12px 24px 0',
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
      }}>
        <div>
          <div style={{ fontFamily: 'Roboto Mono', fontSize: 11, letterSpacing: '0.1em', color: t.textMuted, textTransform: 'uppercase' }}>
            Day {dayOfYear} of 365
          </div>
          <div style={{ fontFamily: 'DM Sans', fontSize: 13, color: t.textSub, marginTop: 1 }}>{dateStr}</div>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          {/* Theme toggle */}
          <button onClick={toggleTheme} title={themeId === 'dark' ? 'Day mode' : 'Night mode'} style={{
            width: 32, height: 32, borderRadius: '50%',
            border: `1px solid ${t.profileBorder}`,
            background: 'transparent', cursor: 'pointer',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            transition: 'all 0.3s',
          }}>
            {themeId === 'dark'
              ? <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke={t.profileIcon} strokeWidth="1.8"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
              : <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke={t.profileIcon} strokeWidth="1.8"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            }
          </button>
          <div style={{ width: 32, height: 32, borderRadius: '50%', border: `1px solid ${t.profileBorder}`, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={t.profileIcon} strokeWidth="1.8">
              <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
          </div>
        </div>
      </div>

      <CelestialBanner />

      {/* Drum circle */}
      <div style={{
        display: 'flex', justifyContent: 'center',
        marginTop: 20, position: 'relative', flexShrink: 0,
      }}>
        <div style={{
          position: 'absolute', top: '50%', left: '50%',
          width: 190, height: 190, marginLeft: -95, marginTop: -95,
          borderRadius: '50%',
          border: `1px solid ${t.accent}33`,
          animation: 'pulse-ring 3.2s ease-in-out infinite',
        }} />
        <div style={{
          position: 'absolute', top: '50%', left: '50%',
          width: 215, height: 215, marginLeft: -107, marginTop: -107,
          borderRadius: '50%',
          border: `1px solid ${t.accent}18`,
          animation: 'pulse-ring2 3.2s ease-in-out infinite',
        }} />
        <div style={{
          width: 168, height: 168, borderRadius: '50%',
          border: `1.5px solid ${t.drumBorder}`,
          background: t.drumBg,
          position: 'relative',
          animation: 'breathe 3.2s ease-in-out infinite',
          boxShadow: t.drumShadow,
          overflow: 'hidden',
        }}>
          <DrumPattern size={168} color={t.accent} />
          <div style={{
            position: 'absolute', top: '50%', left: '50%',
            width: 8, height: 8, marginLeft: -4, marginTop: -4,
            borderRadius: '50%',
            background: t.accent, opacity: 0.7,
            boxShadow: `0 0 8px ${t.accent}`,
          }} />
        </div>
      </div>

      {/* Heartbeat line */}
      <div style={{ display: 'flex', justifyContent: 'center', marginTop: 12, opacity: 0.7 }}>
        <HeartbeatLine />
      </div>

      {/* Nav tabs */}
      <div style={{ display: 'flex', justifyContent: 'center', gap: 6, marginTop: 14, paddingBottom: 6 }}>
        {['today', 'reflect', 'archive'].map(tab => (
          <button key={tab} onClick={() => setScreen(tab)} style={{
            background: screen === tab ? t.tabActive : 'transparent',
            border: screen === tab ? `1px solid ${t.tabBorder}` : '1px solid transparent',
            color: screen === tab ? t.tabColor : t.tabInactive,
            padding: '5px 14px', borderRadius: 20,
            fontSize: 11, letterSpacing: '0.1em', textTransform: 'uppercase',
            cursor: 'pointer', fontFamily: 'Roboto Mono', transition: 'all 0.25s',
          }}>
            {tab}
          </button>
        ))}
      </div>

      {/* Content area */}
      <div style={{ flex: 1, overflowY: 'auto', padding: '0 24px 24px' }}>

        {screen === 'today' && (
          <div key={animKey} style={{ animation: 'fade-in-up 0.6s ease both' }}>
            <div style={{
              marginTop: 16, padding: '20px 20px',
              background: t.cardBg, border: `1px solid ${t.cardBorder}`,
              borderRadius: 16, position: 'relative',
            }}>
              <div style={{
                position: 'absolute', top: -1, left: 18,
                fontFamily: 'Cormorant Garamond', fontSize: 64,
                color: `${t.accent}33`, lineHeight: 1, pointerEvents: 'none',
              }}>"</div>
              <p style={{
                fontFamily: 'Cormorant Garamond', fontSize: 17, lineHeight: 1.75,
                color: t.text, fontWeight: 300, fontStyle: 'italic',
                marginTop: 10, textWrap: 'pretty',
              }}>
                {today.quote}
              </p>
              <div style={{ marginTop: 16, paddingTop: 14, borderTop: `1px solid ${t.cardBorder}` }}>
                <div style={{ fontFamily: 'DM Sans', fontSize: 12, color: t.accent, letterSpacing: '0.05em' }}>
                  {today.author}
                </div>
                <div style={{ fontFamily: 'DM Sans', fontSize: 11, color: t.tabInactive, marginTop: 2 }}>
                  {today.nation} · {today.year}
                </div>
                <div style={{ fontFamily: 'Cormorant Garamond', fontSize: 12, color: t.textFaint, marginTop: 4, fontStyle: 'italic' }}>
                  from {today.source}
                </div>
              </div>
            </div>

            <div style={{ display: 'flex', gap: 10, marginTop: 14 }}>
              <button onClick={() => setScreen('reflect')} style={{
                flex: 1, padding: '12px 0',
                background: t.tabActive, border: `1px solid ${t.tabBorder}`,
                borderRadius: 12, color: t.accent,
                fontFamily: 'Roboto Mono', fontSize: 12, letterSpacing: '0.1em',
                textTransform: 'uppercase', cursor: 'pointer',
              }}>Reflect</button>
              <button onClick={goNext} style={{
                flex: 1, padding: '12px 0',
                background: t.btnSecBg, border: `1px solid ${t.btnSecBorder}`,
                borderRadius: 12, color: t.btnSecColor,
                fontFamily: 'Roboto Mono', fontSize: 12, letterSpacing: '0.1em',
                textTransform: 'uppercase', cursor: 'pointer',
              }}>Next day →</button>
            </div>

            <div style={{
              marginTop: 14, padding: '12px 16px',
              background: t.notesBg, borderRadius: 12, border: `1px solid ${t.notesBorder}`,
            }}>
              <div style={{ fontFamily: 'Roboto Mono', fontSize: 10, color: t.textFaint, letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 6 }}>Walking the Red Road</div>
              <p style={{ fontFamily: 'Cormorant Garamond', fontSize: 14, color: t.noteText, lineHeight: 1.65 }}>
                The Red Road is the path of righteous and spiritual living in many Indigenous traditions. Each day is a step — mindful, grounded in rhythm.
              </p>
            </div>
          </div>
        )}

        {screen === 'reflect' && (
          <div style={{ animation: 'fade-in-up 0.5s ease both', marginTop: 16 }}>
            <div style={{ fontFamily: 'Cormorant Garamond', fontSize: 13, color: t.textSub, fontStyle: 'italic', letterSpacing: '0.06em', marginBottom: 14, textAlign: 'center' }}>
              What does this teaching stir in you?
            </div>
            <textarea
              value={reflectionText}
              onChange={e => setReflectionText(e.target.value)}
              placeholder="Write freely..."
              style={{
                width: '100%', minHeight: 140,
                background: t.cardBg, border: `1px solid ${t.cardBorder}`,
                borderRadius: 14, color: t.text,
                fontFamily: 'Cormorant Garamond',
                fontSize: 16, lineHeight: 1.7,
                padding: '14px 16px', resize: 'none', outline: 'none',
              }}
            />
            <div style={{
              marginTop: 14, padding: '14px 16px',
              border: `1px solid ${t.cardBorder}`,
              borderRadius: 12, borderLeft: `2px solid ${t.accent}88`,
            }}>
              <p style={{ fontFamily: 'Cormorant Garamond', fontSize: 14, color: t.reflQuoteC, fontStyle: 'italic', lineHeight: 1.65 }}>
                "{today.quote.slice(0, 100)}…"
              </p>
              <div style={{ fontFamily: 'DM Sans', fontSize: 10, color: t.reflAttrC, marginTop: 6, letterSpacing: '0.05em' }}>
                — {today.author}, {today.nation}
              </div>
            </div>
            <button
              onClick={() => { setReflected(true); setScreen('today'); }}
              style={{
                marginTop: 14, width: '100%', padding: '13px 0',
                background: t.tabActive, border: `1px solid ${t.tabBorder}`,
                borderRadius: 12, color: t.accentDim,
                fontFamily: 'Roboto Mono', fontSize: 12, letterSpacing: '0.1em',
                textTransform: 'uppercase', cursor: 'pointer',
              }}>Save reflection</button>
          </div>
        )}

        {screen === 'archive' && (
          <div style={{ animation: 'fade-in-up 0.5s ease both', marginTop: 16 }}>
            <div style={{ fontFamily: 'Roboto Mono', fontSize: 10, color: t.textFaint, letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 14, textAlign: 'center' }}>
              Previous teachings
            </div>
            {wisdoms.map((w, i) => (
              <div key={i} style={{
                marginBottom: 12, padding: '14px 16px',
                background: t.cardBg, border: `1px solid ${t.cardBorder}`,
                borderRadius: 13, cursor: 'pointer', transition: 'border-color 0.2s',
              }} onClick={() => { setDayIndex(i); setScreen('today'); setAnimKey(k => k + 1); }}>
                <div style={{ fontFamily: 'Roboto Mono', fontSize: 10, color: t.accent, letterSpacing: '0.14em', marginBottom: 6 }}>
                  Day {dayOfYear - wisdoms.length + i + 1} · {w.nation}
                </div>
                <p style={{ fontFamily: 'Cormorant Garamond', fontSize: 14, fontStyle: 'italic', color: t.archTextC, lineHeight: 1.6 }}>
                  "{w.quote.slice(0, 80)}…"
                </p>
                <div style={{ fontFamily: 'DM Sans', fontSize: 10, color: t.archAttrC, marginTop: 6 }}>— {w.author}</div>
              </div>
            ))}
          </div>
        )}
      </div>

      <div style={{ paddingBottom: 6, display: 'flex', justifyContent: 'center' }}>
        <div style={{ width: 3, height: 3, borderRadius: '50%', background: `${t.accent}55` }} />
      </div>
    </div>
    </ThemeCtx.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(
  <IOSDevice dark={false} time="9:41">
    <App />
  </IOSDevice>
);
</script>
<div id="root"></div>
</body>
</html>
